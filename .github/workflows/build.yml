name: Build and test LLDB

on:
  push:
  # Allows manual running from the Actions tab
  workflow_dispatch:

jobs:
  # Job 1: Setup and Download Dependencies (relies on Caching)
  setup-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Install SWIG
      run: sudo apt-get update && sudo apt-get install -y swig

    # Cache the dependencies folder across workflow runs to avoid re-downloading/re-building dependencies
    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download dependencies
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      run: ./download_dependencies.sh

    # Pack and upload dependencies so parallel build jobs can download them instantly
    - name: Upload Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/
        if-no-files-found: 'error'

  # Job 2: Build LLDB Host Binary in Parallel
  build-linux-x86-64:
    needs: setup-linux-x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-host-ccache
        max-size: 2G

    - name: Install SWIG
      run: sudo apt-get update && sudo apt-get install -y swig

    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/

    - name: Restore Executable Permissions
      run: find prebuilts/ -type f -path "*/bin/*" -exec chmod +x {} +

    - name: Build LLDB for host
      run: |
        chmod +x download_dependencies.sh build_lldb.sh
        ./build_lldb.sh
        tar -czf llvm-linux-x86_64.tar.gz -C build-linux-x86_64/install .

    - name: Upload LLDB for host
      uses: actions/upload-artifact@v4
      with:
        name: llvm-linux-x86_64
        path: llvm-linux-x86_64.tar.gz
        if-no-files-found: 'error'

  # Job 3: Build lldb-server for Android arm64
  build-android-arm64:
    needs: setup-linux-x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-android-arm64-ccache
        max-size: 2G

    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/

    - name: Restore Executable Permissions
      run: find prebuilts/ -type f -path "*/bin/*" -exec chmod +x {} +

    - name: Build lldb-server for Android arm64
      run: |
        chmod +x build_lldb_server.sh
        ANDROID_ABI=arm64-v8a ./build_lldb_server.sh
        tar -czf llvm-android-arm64.tar.gz -C build-arm64-v8a/install .

    - name: Upload lldb-server for Android arm64
      uses: actions/upload-artifact@v4
      with:
        name: llvm-android-arm64
        path: llvm-android-arm64.tar.gz
        if-no-files-found: 'error'

  # Job 4: Build lldb-server for Android arm32
  build-android-arm32:
    needs: setup-linux-x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-android-arm-ccache
        max-size: 2G

    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/

    - name: Restore Executable Permissions
      run: find prebuilts/ -type f -path "*/bin/*" -exec chmod +x {} +

    - name: Build lldb-server for Android arm32
      run: |
        chmod +x build_lldb_server.sh
        ANDROID_ABI=armeabi-v7a ./build_lldb_server.sh
        tar -czf llvm-android-arm.tar.gz -C build-armeabi-v7a/install .

    - name: Upload lldb-server for Android arm32
      uses: actions/upload-artifact@v4
      with:
        name: llvm-android-arm
        path: llvm-android-arm.tar.gz
        if-no-files-found: 'error'

  # Job 5: Build lldb-server for Android x86_64
  build-android-x86_64:
    needs: setup-linux-x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-android-x86_64-ccache
        max-size: 2G

    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/

    - name: Restore Executable Permissions
      run: find prebuilts/ -type f -path "*/bin/*" -exec chmod +x {} +

    - name: Build lldb-server for Android x86_64
      run: |
        chmod +x build_lldb_server.sh
        ANDROID_ABI=x86_64 ./build_lldb_server.sh
        tar -czf llvm-android-x86_64.tar.gz -C build-x86_64/install .

    - name: Upload lldb-server for Android x86_64
      uses: actions/upload-artifact@v4
      with:
        name: llvm-android-x86_64
        path: llvm-android-x86_64.tar.gz
        if-no-files-found: 'error'

  build-android-riscv64:
    needs: setup-linux-x86_64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-android-riscv64-ccache
        max-size: 2G

    - name: Cache Dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: prebuilts/
        key: ${{ runner.os }}-dependencies-${{ hashFiles('download_dependencies.sh') }}

    - name: Download Dependencies Artifact
      if: steps.cache-dependencies.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v4
      with:
        name: lldb-dependencies
        path: prebuilts/

    - name: Restore Executable Permissions
      run: find prebuilts/ -type f -path "*/bin/*" -exec chmod +x {} +

    - name: Build lldb-server for Android riscv64
      run: |
        chmod +x build_lldb_server.sh
        ANDROID_ABI=riscv64 ./build_lldb_server.sh
        tar -czf llvm-android-riscv64.tar.gz -C build-riscv64/install .

    - name: Upload lldb-server for Android riscv64
      uses: actions/upload-artifact@v4
      with:
        name: llvm-android-riscv64
        path: llvm-android-riscv64.tar.gz
        if-no-files-found: 'error'

  build-windows-x86-64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-windows-ccache
        max-size: 2G

    - name: Install SWIG
      run: choco install swig -y

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build LLDB for Windows
      run: powershell ./build_lldb.ps1

    - name: Compress Artifact
      run: Compress-Archive -Path build-windows-x86_64/install/* -DestinationPath llvm-windows-x86_64.zip

    - name: Upload LLDB for Windows
      uses: actions/upload-artifact@v4
      with:
        name: llvm-windows-x86_64
        path: llvm-windows-x86_64.zip
        if-no-files-found: 'error'

  build-macos:
    name: build-darwin-${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.arch }}-ccache
        max-size: 2G

    - name: Install SWIG
      run: brew install swig

    - name: Build LLDB for macOS (${{ matrix.arch }})
      run: |
        chmod +x build_lldb_macos.sh
        MACOS_ARCH=${{ matrix.arch }} ./build_lldb_macos.sh
        tar -czf llvm-darwin-${{ matrix.arch }}.tar.gz -C build-macos-${{ matrix.arch }}/install .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llvm-darwin-${{ matrix.arch }}
        path: llvm-darwin-${{ matrix.arch }}.tar.gz
        if-no-files-found: 'error'

  # Job 6: Create and Publish GitHub Release (triggers only on tag push)
  release:
    needs: [build-linux-x86-64, build-android-arm64, build-android-arm32, build-android-x86_64, build-android-riscv64, build-windows-x86-64, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5

    - name: Download LLVM Host Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-linux-x86_64

    - name: Download Android arm64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-android-arm64

    - name: Download Android arm32 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-android-arm

    - name: Download Android x86_64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-android-x86_64

    - name: Download Android riscv64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-android-riscv64

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-windows-x86_64

    - name: Download MacOS ARM64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-darwin-arm64

    - name: Download MacOS x86_64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: llvm-darwin-x86_64

    - name: Publish Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          llvm-linux-x86_64.tar.gz
          llvm-android-arm64.tar.gz
          llvm-android-arm.tar.gz
          llvm-android-x86_64.tar.gz
          llvm-android-riscv64.tar.gz
          llvm-windows-x86_64.zip
          llvm-darwin-arm64.tar.gz
          llvm-darwin-x86_64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
